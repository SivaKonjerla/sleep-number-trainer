<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#005ba3"/>
      <stop offset="100%" style="stop-color:#003d6b"/>
    </linearGradient>
    <linearGradient id="micGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e8e8e8"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGradient)"/>

  <!-- Decorative circle accent -->
  <circle cx="420" cy="92" r="60" fill="#0066b3" opacity="0.3"/>
  <circle cx="92" cy="420" r="45" fill="#0066b3" opacity="0.3"/>

  <!-- Speech bubble (behind mic) -->
  <path d="M340 140
           C340 140 420 140 420 220
           L420 280
           C420 360 340 360 340 360
           L220 360
           L180 410
           L180 360
           L172 360
           C172 360 92 360 92 280
           L92 220
           C92 140 172 140 172 140
           Z"
        fill="white"
        opacity="0.15"/>

  <!-- Microphone body -->
  <rect x="206" y="120" width="100" height="160" rx="50" ry="50" fill="url(#micGradient)"/>

  <!-- Microphone grille lines -->
  <line x1="226" y1="160" x2="286" y2="160" stroke="#004b8c" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
  <line x1="226" y1="185" x2="286" y2="185" stroke="#004b8c" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
  <line x1="226" y1="210" x2="286" y2="210" stroke="#004b8c" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
  <line x1="226" y1="235" x2="286" y2="235" stroke="#004b8c" stroke-width="4" stroke-linecap="round" opacity="0.3"/>

  <!-- Microphone stand arc -->
  <path d="M160 250
           C160 330 200 370 256 370
           C312 370 352 330 352 250"
        fill="none"
        stroke="white"
        stroke-width="16"
        stroke-linecap="round"/>

  <!-- Microphone stand vertical -->
  <line x1="256" y1="370" x2="256" y2="420" stroke="white" stroke-width="16" stroke-linecap="round"/>

  <!-- Microphone base -->
  <line x1="200" y1="420" x2="312" y2="420" stroke="white" stroke-width="16" stroke-linecap="round"/>

  <!-- Sound waves (right side) -->
  <path d="M370 180 C390 200 390 240 370 260" fill="none" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
  <path d="M395 160 C425 195 425 245 395 280" fill="none" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
  <path d="M420 140 C460 190 460 250 420 300" fill="none" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.3"/>

  <!-- Sound waves (left side) -->
  <path d="M142 180 C122 200 122 240 142 260" fill="none" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
  <path d="M117 160 C87 195 87 245 117 280" fill="none" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
  <path d="M92 140 C52 190 52 250 92 300" fill="none" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.3"/>
</svg>
