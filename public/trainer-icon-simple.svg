  <!-- Sound wave accent (top right) -->
  <path d="M420 80 C445 100 445 140 420 160"
        fill="none" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
  <path d="M445 60 C480 90 480 150 445 180"
        fill="none" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.3"/>
</svg>
